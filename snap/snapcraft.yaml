name: open-calc-studio
title: Open Calc Studio
base: core22
adopt-info: open-calc-studio
summary: Open construction cost-calculation studio for AEC
description: |
  Open Calc Studio is an open-source budget and cost-calculation
  application for the architecture, engineering, and construction
  industry. Built on Tauri, it offers a fast native UI, IFC import,
  PDF/Excel export, and an embedded MCP server for AI integrations.

license: AGPL-3.0
contact: https://github.com/OpenAEC-Foundation/open-calc-studio/issues
website: https://github.com/OpenAEC-Foundation/open-calc-studio
source-code: https://github.com/OpenAEC-Foundation/open-calc-studio
issues: https://github.com/OpenAEC-Foundation/open-calc-studio/issues

grade: stable
confinement: strict
compression: lzo

architectures:
  - build-on: amd64

apps:
  open-calc-studio:
    command: usr/bin/open-calc-studio
    extensions: [gnome]
    common-id: com.opencalcstudio.app
    desktop: usr/share/applications/open-calc-studio.desktop
    plugs:
      - home
      - network
      - removable-media
      - audio-playback
      - opengl
      - gsettings
      - browser-support

parts:
  open-calc-studio:
    plugin: nil
    source: .
    source-type: local
    build-snaps:
      - node/22/stable
      - rustup/latest/stable
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libjavascriptcoregtk-4.1-dev
      - libsoup-3.0-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libssl-dev
      - patchelf
      - build-essential
      - pkg-config
      - curl
      - wget
      - file
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libjavascriptcoregtk-4.1-0
      - libsoup-3.0-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - libssl3
      - libnss3
    override-pull: |
      craftctl default
      VERSION="$(grep '\"version\"' package.json | head -1 | sed -E 's/.*\"version\": *\"([^\"]+)\".*/\1/')"
      craftctl set version="$VERSION"
    override-build: |
      set -eux
      rustup default stable
      rustup target add x86_64-unknown-linux-gnu
      npm install
      npm run build
      npx tauri build --bundles deb --target x86_64-unknown-linux-gnu
      DEB="$(ls src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb | head -1)"
      dpkg-deb -x "$DEB" "$CRAFT_PART_INSTALL/"

      # Snapd's wrapper-script generator splits app commands on whitespace,
      # so the space in "Open Calc Studio" breaks pack. Rename the binary,
      # desktop file, and icon files to a hyphenated lowercase form. The
      # /usr/lib/Open Calc Studio/ resource directory is left intact since
      # Tauri resolves resources via current_exe() at runtime.
      mv "$CRAFT_PART_INSTALL/usr/bin/Open Calc Studio" \
         "$CRAFT_PART_INSTALL/usr/bin/open-calc-studio"
      mv "$CRAFT_PART_INSTALL/usr/share/applications/Open Calc Studio.desktop" \
         "$CRAFT_PART_INSTALL/usr/share/applications/open-calc-studio.desktop"
      sed -i \
        -e 's|^Exec=.*|Exec=open-calc-studio|' \
        -e 's|^Icon=.*|Icon=open-calc-studio|' \
        "$CRAFT_PART_INSTALL/usr/share/applications/open-calc-studio.desktop"
      find "$CRAFT_PART_INSTALL/usr/share/icons" -name "Open Calc Studio.png" \
        -execdir mv {} open-calc-studio.png \;
