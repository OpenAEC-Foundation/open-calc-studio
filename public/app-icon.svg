<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Custom Euro symbol -->
  <g fill="none" stroke="white">
    <!-- The "C" arc (banana) — rounded ends -->
    <path d="M 350 140
             A 130 145 0 1 0 350 380"
          stroke-width="52"
          stroke-linecap="round"/>
    <!-- Top horizontal bar — sharp rectangular ends -->
    <line x1="110" y1="218" x2="270" y2="218" stroke-width="44" stroke-linecap="butt"/>
    <!-- Bottom horizontal bar — sharp rectangular ends -->
    <line x1="110" y1="302" x2="260" y2="302" stroke-width="44" stroke-linecap="butt"/>
  </g>
</svg>
